<!DOCTYPE html>
<html>
<head>
    <title>Two Sample T-Test</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 500px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        input, select, button {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        pre {
            background: #eee;
            padding: 10px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Two Sample T-Test</h2>

    <label>Sample 1 (comma separated)</label>
    <input type="text" id="sample1" placeholder="10,12,14,15">

    <label>Sample 2 (comma separated)</label>
    <input type="text" id="sample2" placeholder="8,9,11,13">

    <label>Alternative Hypothesis</label>
    <select id="alternative">
        <option value="two-sided">Two-Sided</option>
        <option value="left">Left</option>
        <option value="right">Right</option>
    </select>

    <button onclick="runTest()">Run T-Test</button>

    <h3>Result:</h3>
    <pre id="result"></pre>
</div>

<script>
function runTest() {
    let sample1 = document.getElementById("sample1").value
        .split(",")
        .map(Number);

    let sample2 = document.getElementById("sample2").value
        .split(",")
        .map(Number);

    let alternative = document.getElementById("alternative").value;

    fetch("/ttest", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            sample1: sample1,
            sample2: sample2,
            alternative: alternative
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("result").innerText =
            JSON.stringify(data, null, 4);
    })
    .catch(error => {
        document.getElementById("result").innerText =
            "Error: " + error;
    });
}
</script>

</body>
</html>
